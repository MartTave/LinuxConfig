# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


cursor {
  no_hardware_cursors = true
}



###############
### PLUGINS ###
###############

################
### MONITORS ###
################
workspace=1, persistent:true
workspace=2, persistent:true
workspace=3, persistent:true
workspace=4, persistent:true
workspace=5, persistent:true
workspace=6, persistent:true
workspace=7, persistent:true
workspace=8, persistent:true
workspace=9, persistent:true
workspace=10, persistent:true

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = kitty -e yazi
$menu = walker
$browser = firefox


#################
### AUTOSTART ###
#################
exec-once = quickshell
exec-once = hyprpaper
exec-once = swaync
# exec-once = sleep 2 &&  ~/.scripts/random_wp.sh
exec-once = kanshi
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = sleep 0.5 && walker && walker
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

#env = XCURSOR_SIZE,18
#env = HYPRCURSOR_SIZE,18


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 7

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.8

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = truerazer-razer-basilisk-v3-pro
        size = 5
        passes = 1

        vibrancy = 0.1696
    }
    shadow {
	    enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    smart_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr=true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = ch
    kb_variant = fr
    kb_model =
    kb_options =
    kb_rules =
    scroll_factor = 1.0
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
	scroll_factor = 1.0
        natural_scroll = true
    }
}

device {
  # mouse with bluetooth
  name = bsk-v3-pro-mouse
  sensitivity = -0.4
}

device {
  name = razer-razer-basilisk-v3-pro
  scroll_factor = 0.8
  sensitivity = -0.8
}

source = ~/.config/hypr/hyprland_wacom.conf

# Gestures
gesture = 3, horizontal, workspace



####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, P, exec, nwg-displays
bind = $mainMod, C, exec, ~/.config/.scripts/random_wp.sh
bind = $mainMod, F4, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, I, exec, $browser,
bind = $mainMod SHIFT, L, exec, hyprlock -q --grace 0 & sleep 2 && systemctl sleep
bind = $mainMod, V, togglefloating,
bind=$mainMod , F,fullscreen
bind = $mainMod, R, exec, $menu
bind = $mainMod, space, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F1, exec, hyprshot-gui
bind = $mainMod, F2, exec, hyprshot -m region --raw --clipboard-only | swappy -f -
bind = $mainMod, L, exec, hyprlock -q --grace 0
bind = $mainMod, N, exec, swaync-client -t -sw

# Custom scripts
bind = $mainMod, X, exec, ~/.scripts/power_menu.sh
bind = $mainMod, C, exec, ~/.scripts/random_wp.sh

# Force restart kanshi to reset monitors

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Media keys :
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Requires playerctl
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

# Move workspace to monitor
bind = $mainMod SHIFT, right, movecurrentworkspacetomonitor, +1
bind = $mainMod SHIFT, left, movecurrentworkspacetomonitor, -1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = SUPER, ALT_L, resizewindow
bindm = SUPER, Control_L, movewindow

bind = $mainMod, B, togglespecialworkspace, bitwarden
bind = $mainMod, S, togglespecialworkspace, spotify
bind = $mainMod, T, togglespecialworkspace, thunderbird

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
  name = remove_focus_grab
  match:class = .*
  suppress_event = maximize
}


workspace = special:bitwarden, monitor:eDP-1, on-created-empty:exec bitwarden-desktop

workspace = special:thunderbird, on-created-empty:exec thunderbird

workspace = special:spotify, on-created-empty:exec spotify

windowrule {
  name = bitwarden
  match:class = ^(Bitwarden)$

  workspace = special:bitwarden
  float = on
  size = 1200 800
  focus_on_activate = on
}

windowrule {
  name = spotify
  match:class = ^(spotify)$

  workspace = special:spotify
  float = on
  size = 2000 1200
}

windowrule {
  name = thunderbird
  match:class = ^(Thunderbird)$

  workspace = special:thunderbird
}

windowrule {
  name = hyprshot
  match:title = ^(Hyprshot)$
  float = on
  size = 600 400
}


layerrule {
  name = waybar
  match:namespace = waybar
}

xwayland {
  force_zero_scaling = true
}
